<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

</head>
<body>
    <script>
        let planoSelecionado = 'avulso';

        // ... (Mantenha as funções selecionarPlano e atualizarNomeArquivo) ...

        const form = document.getElementById('transcrever-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const arquivo = document.getElementById('file-input').files[0];
            const btn = document.getElementById('btn-acao');

            // [LÓGICA DE PAGAMENTO AVULSO MANTIDA AQUI...]
            // Ao ser aprovado, chama a função abaixo:
            // await processarEnvioFatiado(arquivo);
        });

        async function processarEnvioFatiado(arquivo) {
            const btn = document.getElementById('btn-acao');
            const TAMANHO_MAX_FATIA = 3.5 * 1024 * 1024; 
            const totalFatias = Math.ceil(arquivo.size / TAMANHO_MAX_FATIA);
            
            // ID único para esta sessão de upload
            const sessionId = Date.now().toString();

            try {
                for (let i = 0; i < totalFatias; i++) {
                    const inicio = i * TAMANHO_MAX_FATIA;
                    const fim = Math.min(inicio + TAMANHO_MAX_FATIA, arquivo.size);
                    const fatiaBlob = arquivo.slice(inicio, fim);

                    btn.innerText = `Enviando parte ${i + 1} de ${totalFatias}...`;

                    const res = await fetch('https://meu-transcritor.onrender.com/api/transcrever-final', { 
                        method: 'POST', 
                        headers: { 
                            'Content-Type': 'application/octet-stream',
                            'x-chunk-index': i,
                            'x-total-chunks': totalFatias,
                            'x-session-id': sessionId
                        },
                        body: fatiaBlob 
                    });
                    
                    const dados = await res.json();
                    if (!res.ok) throw new Error(dados.erro || "Falha no processamento.");

                    // Se o servidor retornou o texto, finalizamos
                    if (dados.texto) {
                        document.getElementById('result-panel').style.display = 'block';
                        document.getElementById('transcription-text').innerText = dados.texto;
                        document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth' });
                        btn.innerText = "Transcrição Concluída!";
                        return;
                    }
                }
            } catch(e) {
                alert("Erro ao processar: " + e.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
