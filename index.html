<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Transcritor de Áudio Profissional - IA</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header>
        <h1>Transcritor de Áudio Profissional</h1>
    </header>
    
    <main>
        <div id="status" class="status-message" style="display:none;"></div>
        <button id="botaoEnviar">Enviar e Iniciar Transcrição</button>
    </main>

    <script>
        // Função que você quer que funcione:
        async function fazerTranscricaoFinal(arquivo) {
            const formData = new FormData();
            formData.append('file', arquivo);

            try {
                const response = await fetch('/api/transcrever', {
                    method: 'POST',
                    body: formData
                });
                const dados = await response.json();
                
                const resultadoDiv = document.getElementById('status');
                resultadoDiv.style.display = 'block';
                resultadoDiv.innerText = dados.texto || dados.erro;
            } catch (e) {
                alert("Erro: " + e.message);
            }
        }
    </script>
</body>
</html>
